name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build:novtsc

      # Strict type-check. Non-blocking for now: the app builds and runs, but
      # ~58 strict-mode `vue-tsc` errors are tracked separately and would
      # otherwise fail every PR. Drop `continue-on-error` once they're cleaned up
      # (and switch the Build step back to `npm run build`).
      - name: Type-check (non-blocking)
        run: npm run typecheck
        continue-on-error: true
