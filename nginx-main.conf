# Top-level nginx config for the distroless, non-root (uid 65532) Chainguard
# nginx image. Everything that needs to be writable is redirected under /tmp,
# and logs go to stdout/stderr so no /var/log/nginx write is required. The
# rendered server block (from the mounted/baked template) is included from
# /tmp/nginx-conf.d — see docker-entrypoint.sh. Do NOT set `user` here: the
# container already runs as non-root, and `user` would just warn and be ignored.
worker_processes  auto;
error_log  /dev/stderr  notice;
pid        /tmp/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /dev/stdout  main;

    # Non-root can't write nginx's default temp paths (/var/...); keep them in /tmp.
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    sendfile        on;
    keepalive_timeout  65;

    # Rendered server block (listens on 8080).
    include /tmp/nginx-conf.d/*.conf;
}
