server {
    listen 80;
    server_tokens off;

    # Security headers applied to every response
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP: scripts/connects restricted to same origin; styles allow inline (Vue scoped styles);
    # fonts from Google Fonts CDN; no framing permitted.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Runtime config served to the SPA. API_PUBLIC_URL is substituted from the
    # container env at start; empty by default (the UI then falls back to its own
    # origin). Exact match wins over the static .js rule below; never cached.
    location = /runtime-config.js {
        default_type application/javascript;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        return 200 'window.__RUSH_CONFIG__={"apiBaseUrl":"${API_PUBLIC_URL}"};';
    }

    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|gif|ico)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        proxy_pass http://${QUERY_API_HOST}/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /prom/ {
        proxy_pass http://${QUERY_API_HOST}/prom/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
