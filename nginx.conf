# Strip the query string from the logged request line and Referer. The SPA keeps
# UI state (search term, mode, time range) in the URL — e.g. /?q=<term>&mode=logs.
# Those access logs are themselves ingested back into the logs store, so an
# un-sanitized log makes every search term searchable as log content (and the
# next search re-ingests it). Logging path-only keeps the logs useful without
# echoing query content. These run in the http context (conf.d is included there).
map $request_uri $loggable_uri {
    "~^(?<path>[^?]*)\?" $path;   # has a query string → keep only the path
    default              $request_uri;
}
map $http_referer $loggable_referer {
    "~^(?<base>[^?]*)\?" $base;   # strip the query string from the referer too
    default              $http_referer;
}
log_format rush_main '$remote_addr - $remote_user [$time_local] '
                     '"$request_method $loggable_uri $server_protocol" $status $body_bytes_sent '
                     '"$loggable_referer" "$http_user_agent"';

server {
    # Non-root Chainguard nginx (uid 65532) cannot bind <1024; serve on 8080.
    listen 8080;
    server_tokens off;

    # Path-only access log (query strings stripped — see the maps above).
    # Non-root: log to stdout rather than a /var/log/nginx file.
    access_log /dev/stdout rush_main;

    # Security headers applied to every response
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP: scripts/connects restricted to same origin; styles allow inline (Vue scoped styles);
    # fonts from Google Fonts CDN; no framing permitted.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Runtime config served to the SPA. API_PUBLIC_URL is substituted from the
    # container env at start; empty by default (the UI then falls back to its own
    # origin). Exact match wins over the static .js rule below; never cached.
    location = /runtime-config.js {
        default_type application/javascript;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        return 200 'window.__RUSH_CONFIG__={"apiBaseUrl":"${API_PUBLIC_URL}","defaultTheme":"${DEFAULT_THEME}"};';
    }

    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|gif|ico)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        proxy_pass http://${QUERY_API_HOST}/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SSO endpoints (login initiation, IdP callback/ACS, logout, metadata) are
    # served by the backend. Without this they fall through to the SPA `location /`
    # and the auth guard bounces /auth/sso/login back to /login (redirect loop).
    location /auth/ {
        proxy_pass http://${QUERY_API_HOST}/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /prom/ {
        proxy_pass http://${QUERY_API_HOST}/prom/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
